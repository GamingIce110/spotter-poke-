name: Build Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # NOTE: this repo doesn't ship gradlew / gradle-wrapper.jar — that jar
      # is a signed binary artifact, not something to hand-author, and there
      # was no JDK/network available in the environment that generated this
      # project to run `gradle wrapper` for real. setup-gradle installs an
      # actual Gradle distribution on the runner instead, so we invoke
      # `gradle` directly rather than `./gradlew`. If you later run
      # `gradle wrapper --gradle-version 8.7` yourself from a real machine,
      # commit the resulting gradlew/gradle-wrapper.jar and switch this
      # step back to ./gradlew for reproducible local builds too.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Fetch model asset if not committed
        run: |
          MODEL_PATH="app/src/main/assets/pose_landmarker_lite.task"
          if [ ! -f "$MODEL_PATH" ]; then
            echo "Model not found in repo, downloading it on the runner instead (avoids pushing a large binary from mobile data)."
            mkdir -p app/src/main/assets
            curl -fL -o "$MODEL_PATH" \
              "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task"
          fi
          ls -la "$MODEL_PATH"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pose-spike-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
