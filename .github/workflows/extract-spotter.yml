name: Extract Spotter Pose Spike

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract ZIP
        run: |
          unzip -o "spotter-pose-spike-1.zip" -d temp

      - name: Move project files to repository root
        shell: bash
        run: |
          shopt -s dotglob
          mv temp/spotter-pose-spike/* .
          rm -rf temp
          rm -f "spotter-pose-spike-1.zip"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Extract Spotter Pose Spike project"
          git push