name: Unzip File and Cleanup

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  unzip-and-clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip and remove original zip
        run: |
          echo "Unzipping mmmm.zip safely..."
          unzip -o mmmm.zip -x ".git/*"
          
          echo "Deleting mmmm.zip..."
          rm mmmm.zip

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated unzip of mmmm.zip and cleanup"
            git push
          fi
